# The base URL for the site
baseURL = 'https://guides.derekleeds.cloud/'
# The title of the site
title = "Derek's Guides"
# Enable Git info for last modified dates
enableGitInfo = true
# Default language
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

# Taxonomies (categories and tags)
[taxonomies]
  category = "categories"
  tag = "tags"

# Pagination
[pagination]
  pagerSize = 10

# Import the Chirpy theme
[module]
  [[module.imports]]
    path = "github.com/geekifan/hugo-theme-chirpy"

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

# Outputs - include JSON for search
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Site parameters
[params]
  description = "How-to guides for AI agents, homelab, and self-hosting"
  
  # Author
  [params.author]
    name = "Derek Leeds"
    email = "contact@derekleeds.com"
    link = "https://derekleeds.cloud"
  
  # Social links for sidebar
  [params.social]
    GitHub = "derekleeds"
    Twitter = ""
    Email = "contact@derekleeds.com"
  
  # Color theme (light, dark, or empty for auto)
  # theme_mode = "dark"
  
  # Avatar - can be local or URL
  avatar = "/avatar.webp"
  
  # Table of contents
  toc = true
  
  # Comments (disabled by default)
  # [params.comments]
  #   active = "giscus"

# Menu configuration
[menus]
  [[menus.main]]
    name = "Infrastructure"
    url = "/posts/infrastructure/"
    weight = 10
  [[menus.main]]
    name = "OpenClaw"
    url = "/posts/openclaw/"
    weight = 20
  [[menus.main]]
    name = "Memory Management"
    url = "/posts/memory-management/"
    weight = 30