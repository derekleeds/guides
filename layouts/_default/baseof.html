<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: system-ui, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 1rem; }
        nav { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
        nav a { margin-right: 1rem; text-decoration: none; color: #0066cc; }
        nav a:hover { text-decoration: underline; }
        article { margin-bottom: 2rem; }
        h1 { margin-bottom: 0.5rem; }
        time { color: #666; font-size: 0.9em; }
        pre { background: #f5f5f5; padding: 1rem; overflow-x: auto; border-radius: 4px; }
        code { background: #f5f5f5; padding: 0.2rem 0.4rem; border-radius: 2px; }
        .date { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/posts/memory-management/">Memory Management</a>
        <a href="/posts/infrastructure/">Infrastructure</a>
        <a href="/posts/openclaw/">OpenClaw</a>
    </nav>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p><a href="https://github.com/derekleeds/guides">View on GitHub</a></p>
    </footer>
</body>
</html>
